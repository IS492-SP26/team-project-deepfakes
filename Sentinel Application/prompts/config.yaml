# Sentinel — Model & Prompt Configuration
# This file documents all AI model settings and prompt versions

models:
  analyst_narrative:
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 512
    temperature: 0.1          # Low: prioritize factual, deterministic outputs
    system_prompt: prompts/analyst.txt
    version: "1.2"
    updated: "2026-04-01"

  taxonomy_classification:
    description: "MIT AI Risk Repository Causal Taxonomy classifier"
    providers:
      claude:
        provider: anthropic
        model: claude-sonnet-4-20250514
        max_tokens: 256
        temperature: 0.1
      llama:
        provider: groq
        model: llama-3.3-70b-versatile
        max_tokens: 256
    dimensions:
      entity: ["AI", "Human", "Other"]
      intent: ["Intentional", "Unintentional", "Other"]
      timing: ["Pre-deployment", "Post-deployment", "Other"]
    output_format: "JSON with entity, intent, timing, confidence, rationale"
    version: "1.0"
    updated: "2026-04-08"

  # Future: local detection model
  # deepfake_classifier:
  #   provider: local
  #   model: efficientnet-b4-dfdc
  #   checkpoint: models/efficientnet_dfdc.pth
  #   input_size: [380, 380]
  #   threshold: 0.75

detection:
  primary_provider: hive_moderation
  fallback: heuristic
  confidence_threshold: 0.75
  file_types_supported:
    - image/jpeg
    - image/png
    - image/webp
    - video/mp4
    - video/webm
    - audio/mpeg
    - audio/wav

enrichment:
  providers:
    - name: virustotal
      enabled: true
      timeout_seconds: 10
    - name: google_safe_browsing
      enabled: true
      timeout_seconds: 10
  mitre_mapping: true

rate_limits:
  per_minute: 30
  per_hour: 200
  max_file_size_mb: 50
  burst_allowed: 5
