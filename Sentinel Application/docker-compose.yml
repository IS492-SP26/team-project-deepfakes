version: "3.9"

services:
  backend:
    build: ./app/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/sentinel.db
      - LOG_TO_FILE=true
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./app/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

volumes:
  data:
  logs:
